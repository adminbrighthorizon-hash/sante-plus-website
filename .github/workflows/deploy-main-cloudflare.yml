name: Deploy main to Cloudflare Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cloudflare-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site for Cloudflare Pages
        run: npm run build
        env:
          PUBLIC_SITE_URL: https://${{ secrets.CLOUDFLARE_PROJECT_NAME }}.pages.dev
          PUBLIC_BASE_PATH: /

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
